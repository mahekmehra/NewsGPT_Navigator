services:
  - type: web
    name: newsgpt-navigator
    runtime: python
    plan: free
    region: oregon # Render's most common region, fallback to Oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -k uvicorn.workers.UvicornWorker --workers 1 --threads 2 --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
        placeholder: "Insert your Groq API Key"
      - key: NEWS_API_KEY
        sync: false
        placeholder: "Insert your NewsAPI.org Key"
      - key: QUALITY_THRESHOLD
        value: "0.4"
      - key: BIAS_THRESHOLD
        value: "0.3"
      - key: MAX_RETRIES
        value: "3"
    healthCheckPath: /api/health
    autoDeploy: true
