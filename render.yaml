services:
  - type: web
    name: newsgpt-navigator
    runtime: python
    plan: free
    region: oregon # Render's most common region, fallback to Oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -w 1 -k uvicorn.workers.UvicornWorker --threads 1 --timeout 180 --log-level debug
    envVars:
      - key: GROQ_API_KEY
        sync: false
        placeholder: "Insert your Groq API Key"
      - key: NEWS_API_KEY
        sync: false
        placeholder: "Insert your NewsAPI.org Key"
      - key: QUALITY_THRESHOLD
        value: "0.4"
      - key: BIAS_THRESHOLD
        value: "0.3"
      - key: MAX_RETRIES
        value: "3"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api/health
    autoDeploy: true
